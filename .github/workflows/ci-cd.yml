name: CAP + Fiori CI/CD

on:
  push:
    branches:
      - master   # or main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build CAP + Fiori
        run: npm run build

      # ✅ FIXED (no more cf errors)
      - name: Setup CF CLI
        uses: cloudfoundry/cf-cli-action@v2

      - name: Verify CF CLI
        run: |
          which cf
          cf version

      - name: CF Login
        run: |
          cf login -a "${{ secrets.CF_API_URL }}" \
                   -u "${{ secrets.CF_USERNAME }}" \
                   -p "${{ secrets.CF_PASSWORD }}" \
                   -o "${{ secrets.CF_ORG }}" \
                   -s "${{ secrets.CF_SPACE }}"

      - name: Deploy CAP Service
        run: cf push cap01-service -f gen/db/manifest.yml

      - name: Deploy UI
        run: cf push cap01-ui -f gen/ui/manifest.yml
