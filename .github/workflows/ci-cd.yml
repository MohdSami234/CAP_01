name: CAP + Fiori CI/CD

on:
  push:
    branches:
      - master   # change to main if needed

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Node setup
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install deps
      - name: Install dependencies
        run: npm install

      # 4. Build
      - name: Build CAP + Fiori
        run: npm run build

      # 5. Install CF CLI (FIXED ✅)
      - name: Install Cloud Foundry CLI
        run: |
          curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&source=github" -o cf.tgz
          tar -xzf cf.tgz
          chmod +x cf
          sudo mv cf /usr/local/bin/cf
          which cf
          cf version

      # 6. Login
      - name: CF Login
        run: |
          cf login -a "${{ secrets.CF_API_URL }}" \
                   -u "${{ secrets.CF_USERNAME }}" \
                   -p "${{ secrets.CF_PASSWORD }}" \
                   -o "${{ secrets.CF_ORG }}" \
                   -s "${{ secrets.CF_SPACE }}"

      # 7. Deploy CAP Service
      - name: Deploy CAP Service
        run: cf push cap01-service -f gen/db/manifest.yml

      # 8. Deploy UI
      - name: Deploy UI
        run: cf push cap01-ui -f gen/ui/manifest.yml