name: CAP + Fiori CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build CAP + Fiori
        run: npm run build

      # ✅ FIXED CF CLI INSTALL (official + stable)
      - name: Install Cloud Foundry CLI
        run: |
          set -e
          echo "Installing CF CLI..."
          curl -fsSL https://packages.cloudfoundry.org/install.sh | sudo bash

          echo "Verifying installation..."
          which cf
          cf version

      # ✅ CF LOGIN (non-interactive)
      - name: CF Login
        run: |
          cf api ${{ secrets.CF_API_URL }}
          cf auth ${{ secrets.CF_USERNAME }} ${{ secrets.CF_PASSWORD }}
          cf target -o ${{ secrets.CF_ORG }} -s ${{ secrets.CF_SPACE }}

      # ✅ DEPLOY
      - name: Deploy CAP + Fiori
        run: |
          cf push cap01-service -f gen/db/manifest.yml
          cf push cap01-ui -f gen/ui/manifest.yml
