name: CAP + Fiori CI/CD

on:
  push:
    branches:
      - master   # ⚠️ change to master if your repo uses master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Build CAP + Fiori
      - name: Build project
        run: npm run build

      # 5. Install Cloud Foundry CLI (BEST PRACTICE ✅)
      - name: Setup CF CLI
        uses: cloudfoundry/cf-cli-action@v2

      # 6. Verify CF CLI
      - name: CF version
        run: cf version

      # 7. Login to Cloud Foundry
      - name: CF Login
        run: |
          cf login -a "${{ secrets.CF_API_URL }}" \
                   -u "${{ secrets.CF_USERNAME }}" \
                   -p "${{ secrets.CF_PASSWORD }}" \
                   -o "${{ secrets.CF_ORG }}" \
                   -s "${{ secrets.CF_SPACE }}"

      # 8. Deploy CAP Service
      - name: Deploy CAP Service
        run: cf push cap01-service

      # 9. Deploy Fiori App (if exists)
      - name: Deploy UI
        run: |
          if [ -d "app" ]; then
            cf push cap01-ui
          fi