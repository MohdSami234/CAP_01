name: CAP + Fiori CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ Node setup
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      # ✅ Install dependencies
      - name: Install dependencies
        run: npm ci

      # ✅ Build
      - name: Build CAP + Fiori
        run: npm run build

      # ✅ Install CF CLI (FIXED & STABLE)
      - name: Install Cloud Foundry CLI
        run: |
          set -e

          echo "Downloading CF CLI v8..."

          curl -L --retry 5 --retry-delay 5 \
          "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8" \
          -o cf.tgz

          echo "Check file size:"
          ls -lh cf.tgz

          echo "Validating file type:"
          file cf.tgz

          if ! file cf.tgz | grep -q "gzip compressed"; then
            echo "❌ Invalid download. Dumping file:"
            cat cf.tgz
            exit 1
          fi

          echo "Extracting..."
          tar -xzf cf.tgz

          echo "Setting permissions..."
          chmod +x cf8

          echo "Moving to PATH..."
          sudo mv cf8 /usr/local/bin/cf

          echo "Verifying installation..."
          which cf
          cf version

      # ✅ CF Login
      - name: CF Login
        run: |
         set -e

         cf api "${{ secrets.CF_API }}"

         cf login -u "${{ secrets.CF_USERNAME }}" \
             -p "${{ secrets.CF_PASSWORD }}" \
             -o "${{ secrets.CF_ORG }}" \
             -s "${{ secrets.CF_SPACE }}"
         cf target
      # ✅ Deploy
      - name: Deploy CAP + Fiori
        run: |
         cf push cap01-service -p gen/srv
         # // cf push cap01-ui -f gen/ui/manifest.yml
